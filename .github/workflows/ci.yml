# Per-push CI for Lantern (closes #15).
#
# Runs on every push to main + every PR. Validates the four things we
# already run manually before every commit:
#
#   - go build ./...   (cross-compile cleanly)
#   - go test ./...    (full suite, race detector on)
#   - go vet ./...
#   - gofmt -l         (no formatting drift)
#
# Runner: self-hosted on the Reiers home cluster (node1-lantern,
# 10.20.0.11, Ubuntu 26.04, 6c/12t E5-1650v2, 60G RAM). Registered
# 2026-07-23. Go 1.26.4 pre-installed; setup-go@v5 still runs to
# keep the Go module cache warm across runs. If the runner is offline,
# jobs queue until it comes back — the runner service auto-restarts
# under user systemd and survives reboot (loginctl enable-linger).
# Falls back to ubuntu-latest manually by editing runs-on.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: build + test + vet + fmt
    runs-on: [self-hosted, linux, x64, node1, lantern]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: '0'
        run: go build ./...

      - name: go test (race detector)
        env:
          CGO_ENABLED: '1' # race detector needs cgo
          # CI must be hermetic. Two independent gates cover the
          # network-dependent tests that flake from GitHub runners
          # (glif: RPCConnectionError / context deadline exceeded):
          #   - LANTERN_OFFLINE=1 skips the env-gated integration tests
          #     (state/accessor mainnet actors). Offline fixture tests
          #     still cover the same decode/verify paths.
          #   - -short skips the testing.Short()-gated network tests
          #     (pkg/daemon TestStartAnchorsAgainstNetwork, net/hello,
          #     net/chainxchg, net/mpool, net/libp2p live-swarm tests).
          LANTERN_OFFLINE: '1'
        run: go test -race -short -timeout 5m ./...

      - name: gofmt
        run: |
          set -e
          drift="$(gofmt -l .)"
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift detected in:"
            echo "$drift"
            echo ""
            echo "Run 'gofmt -w .' locally and re-commit."
            exit 1
          fi

      # Dependency firewall (#24 / #131): the shipping `lantern` binary
      # must never transitively acquire the research/fvm module's WASM
      # runtime. wazero is the one dependency that is exclusively used
      # by the research prototype; if it shows up here, some code path
      # imported into main has crossed the module boundary.
      # (multihash + refmt are already used by main for CID + CBOR, so
      # they cannot serve as canary packages.)
      - name: research-fvm dependency firewall
        run: |
          set -e
          leak="$(go list -deps ./... | grep '^github.com/tetratelabs/wazero' || true)"
          if [ -n "$leak" ]; then
            echo "::error::Main lantern module transitively imports wazero:"
            echo "$leak"
            echo ""
            echo "research/fvm has its own go.mod. If wazero is needed in the"
            echo "shipping binary, that is a promotion decision, not an import."
            exit 1
          fi
          echo "Main module dependency graph is clean (no wazero)."

  research-fvm:
    name: research/fvm (scoped module)
    runs-on: [self-hosted, linux, x64, node1, lantern]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: research/fvm/go.sum

      - name: go build
        working-directory: research/fvm
        env:
          CGO_ENABLED: '0'
        run: go build ./...

      - name: go test
        working-directory: research/fvm
        env:
          CGO_ENABLED: '0'
        run: go test -timeout 5m ./...

      - name: go vet
        working-directory: research/fvm
        run: go vet ./...
