name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.7'

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-14   # Apple silicon
          - os: linux
            arch: amd64
            runner: ubuntu-22.04
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          # darwin/amd64 dropped 2026-05-22: macOS 13 runner queues are
          # unreliable on GitHub-hosted runners; arm64 covers every Mac
          # since 2020. Intel Mac users build from source via install.sh.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: Build pure-Go (CGO_ENABLED=0)
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          OUT="dist/lantern-${{ matrix.os }}-${{ matrix.arch }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.versionTag=${VERSION}" \
            -o "${OUT}" \
            ./cmd/lantern
          # SHA-256 manifest
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${OUT}" > "${OUT}.sha256"
          else
            sha256sum "${OUT}" > "${OUT}.sha256"
          fi
          # Show the manifest so it's in the workflow log too
          cat "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lantern-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/lantern-${{ matrix.os }}-${{ matrix.arch }}
            dist/lantern-${{ matrix.os }}-${{ matrix.arch }}.sha256

  source-tarball:
    name: source tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create reproducible source tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PREFIX="lantern-${VERSION#v}"
          mkdir -p dist
          # Use git archive for byte-deterministic source bundling.
          git archive --format=tar.gz --prefix="${PREFIX}/" \
            -o "dist/lantern-${VERSION}-source.tar.gz" HEAD
          (cd dist && sha256sum "lantern-${VERSION}-source.tar.gz" > "lantern-${VERSION}-source.tar.gz.sha256")
          cat "dist/lantern-${VERSION}-source.tar.gz.sha256"

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: |
            dist/lantern-*.tar.gz
            dist/lantern-*.tar.gz.sha256

  release:
    name: GitHub release
    needs: [build, source-tarball]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Collect all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and inspect
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name 'lantern-*' \) -exec cp {} release/ \;
          ls -la release/

      # Build the release body. If a hand-written RELEASE-NOTES-<tag>.md
      # exists in the repo at this tag, use it verbatim as the body (this is
      # the human "what changed / why update" changelog). Otherwise fall back
      # to the generic boilerplate. Either way we append the standard
      # install / binaries / reproducible-build footer so it's never lost.
      - name: Assemble release body
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          NOTES="RELEASE-NOTES-${TAG}.md"
          {
            if [ -f "$NOTES" ]; then
              cat "$NOTES"
            else
              echo "# Lantern ${TAG}"
              echo
              echo "Pure-Go Filecoin light node. No CGo, no snapshot, no third-party trust."
              echo
              echo "_(No hand-written changelog for this tag; see the commit list below.)_"
            fi
            echo
            echo "---"
            echo
            echo "## Install (macOS / Linux)"
            echo
            echo '```sh'
            echo "curl -fsSL https://get.lantern.reiers.io | bash"
            echo '```'
            echo
            echo "## Binaries"
            echo
            echo "All binaries are built \`CGO_ENABLED=0\` with \`-trimpath\`. SHA-256 manifests are published alongside each binary; see \`docs/REPRODUCIBLE-BUILDS.md\` to reproduce these bytes from source."
            echo
            echo "## Source tarball"
            echo
            echo "\`lantern-${TAG}-source.tar.gz\` is the byte-deterministic source archive produced by \`git archive\` at this tag, for reproducible-build verification."
          } > release-body.md
          echo "--- assembled release body ---"
          cat release-body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
          body_path: release-body.md
