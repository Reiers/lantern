<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lantern wordmark v3. Tighter lockup:
  - Icon scaled so the body height matches the wordmark cap height
  - Gap between icon and 'L' reduced to ~width of one letter
  - Wordmark vertically optical-centered against the icon body (mid-line)
  - Icon stroke darkened slightly for visual weight parity with text
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img" aria-label="Lantern">
  <!-- Mark, smaller so the body matches cap height of the wordmark ~ 46px -->
  <g transform="translate(0, 6) scale(0.7)">
    <circle cx="32" cy="4" r="2.4" fill="none" stroke="#0066cc" stroke-width="2"/>
    <line x1="32" y1="6.4" x2="32" y2="10" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
    <rect x="22" y="10" width="20" height="4" rx="1.2" fill="#0066cc"/>
    <path d="M 22 14 C 12 16, 6 24, 6 42 C 6 60, 12 68, 22 70 L 42 70 C 52 68, 58 60, 58 42 C 58 24, 52 16, 42 14 Z"
          fill="rgba(0, 144, 255, 0.16)" stroke="#0066cc" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M 22 14 C 16 30, 16 54, 22 70" stroke="#0066cc" stroke-width="1.4" fill="none" opacity="0.6"/>
    <path d="M 32 14 C 32 30, 32 54, 32 70" stroke="#0066cc" stroke-width="1.4" fill="none" opacity="0.5"/>
    <path d="M 42 14 C 48 30, 48 54, 42 70" stroke="#0066cc" stroke-width="1.4" fill="none" opacity="0.6"/>
    <rect x="22" y="70" width="20" height="4" rx="1.2" fill="#0066cc"/>
    <line x1="32" y1="74" x2="32" y2="79" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="80.5" r="1.8" fill="#0066cc"/>
  </g>
  <!-- Wordmark, tightened gap, optical-center against the lantern body midline -->
  <text x="58" y="62"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif"
        font-size="52"
        font-weight="600"
        letter-spacing="-1.4"
        fill="#0a1628">Lantern</text>
</svg>
